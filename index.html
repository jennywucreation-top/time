<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日时间分配记录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #f5f7fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .page-title {
            font-size: 24px;
            color: #333;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .clock-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin-bottom: 40px;
        }

        .pie-base {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: #e9e9e9;
            position: relative;
            cursor: pointer;
        }

        .clock-mark {
            position: absolute;
            font-size: 18px;
            font-weight: bold;
            color: #666;
            transform: translate(-50%, -50%);
        }

        .mark-12 { top: 0; left: 50%; }
        .mark-3 { top: 50%; right: 0; transform: translate(0, -50%); }
        .mark-6 { bottom: 0; left: 50%; }
        .mark-9 { top: 50%; left: 0; transform: translate(0, -50%); }

        /* 时间显示在圆盘外侧，绝对不重合 */
        .dynamic-time {
            position: absolute;
            font-size: 20px;
            font-weight: bold;
            color: #ff6b6b;
            transform: translate(-50%, -50%);
            z-index: 20;
            display: none;
        }

        .pie-sector {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: #ff6b6b;
            display: none;
        }

        .form-group {
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .time-title {
            font-size: 22px;
            color: #222;
            font-weight: 600;
            display: none;
        }

        .task-select, .delivery-input {
            width: 280px;
            padding: 10px 15px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            display: none;
        }

        .confirm-btn {
            padding: 10px 25px;
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            display: none;
        }

        .tip {
            color: #888;
            font-size: 14px;
            margin-top: 10px;
        }

        /* 事项标签 + 箭头 —— 完全放在圆盘外侧，不重合 */
        .event-item {
            position: absolute;
            padding: 6px 12px;
            background: white;
            border-radius: 6px;
            box-shadow: 0 2px 6px #00000022;
            font-size: 14px;
            z-index: 30;
            pointer-events: none;
            transform: translate(-50%, -50%);
        }

        .event-arrow {
            position: absolute;
            width: 2px;
            z-index: 25;
            transform-origin: left center;
        }
    </style>
</head>
<body>
    <h1 class="page-title">每日时间分配记录</h1>
    
    <div class="clock-container" id="clockContainer">
        <div class="pie-base" id="pieBase">
            <div class="pie-sector" id="sector"></div>
            <div class="dynamic-time" id="startTimeLabel"></div>
            <div class="dynamic-time" id="endTimeLabel"></div>
            <div class="dynamic-time" id="mouseTimeLabel"></div>

            <div class="clock-mark mark-12">12</div>
            <div class="clock-mark mark-3">3</div>
            <div class="clock-mark mark-6">6</div>
            <div class="clock-mark mark-9">9</div>
        </div>
    </div>

    <div class="form-group">
        <h2 class="time-title" id="timeTitle"></h2>
        <select class="task-select" id="taskSelect">
            <option value="">请选择任务</option>
            <option value="boss">投boss直聘</option>
            <option value="eat">吃饭</option>
            <option value="excrete">排泄</option>
        </select>
        <input type="number" class="delivery-input" id="deliveryInput" placeholder="投递 多少加" min="0">
        <button class="confirm-btn" id="confirmBtn">确认添加</button>
    </div>

    <p class="tip">先点起始 → 移动预览 → 点结束 → 选任务 → 确认 | 按ESC取消</p>

    <script>
        const sector = document.getElementById('sector');
        const timeTitle = document.getElementById('timeTitle');
        const taskSelect = document.getElementById('taskSelect');
        const deliveryInput = document.getElementById('deliveryInput');
        const confirmBtn = document.getElementById('confirmBtn');
        const pieBase = document.getElementById('pieBase');
        const startTimeLabel = document.getElementById('startTimeLabel');
        const endTimeLabel = document.getElementById('endTimeLabel');
        const mouseTimeLabel = document.getElementById('mouseTimeLabel');
        const clockContainer = document.getElementById('clockContainer');

        let isSelecting = false;
        let startAngle = 0;
        let endAngle = 0; // 新增：保存结束角度
        const radius = 160;
        const savedSectors = [];
        // 丰富配色，每个时间段颜色完全不同
        const colors = [
            '#ff6b6b', '#4ecdc4', '#45b7d1', '#feca57',
            '#ff9ff3', '#a3cb38', '#ff9f43', '#18dcbb',
            '#5f27cd', '#00d2d3', '#ff3838', '#ff9ff3'
        ];

        // 吸附到整点 / 半点
        function snapToHour(angle) {
            const halfHourAngle = 15;
            let closest = Math.round(angle / halfHourAngle);
            closest = closest % 24;
            return closest * halfHourAngle;
        }

        // 计算鼠标角度
        function getMouseAngle(e) {
            const rect = pieBase.getBoundingClientRect();
            const x = e.clientX - rect.left - radius;
            const y = e.clientY - rect.top - radius;
            let angle = Math.atan2(y, x) * (180 / Math.PI) + 90;
            if (angle < 0) angle += 360;
            return snapToHour(angle);
        }

        // 时间文字
        function angleToTimeText(angle) {
            const totalMinutes = Math.round(angle / 15 * 30);
            const hours = Math.floor(totalMinutes / 60);
            const minutes = totalMinutes % 60;
            if (hours === 0) return minutes === 0 ? '12' : '12:30';
            return minutes === 0 ? hours : `${hours}:30`;
        }

        // 显示时间在圆盘外侧
        function showTimeLabel(element, angle) {
            const rad = (angle - 90) * Math.PI / 180;
            const x = radius + (radius + 40) * Math.cos(rad);
            const y = radius + (radius + 40) * Math.sin(rad);
            
            element.style.left = `${x}px`;
            element.style.top = `${y}px`;
            element.textContent = angleToTimeText(angle);
            element.style.display = 'block';
        }

        // 取消选择
        function cancelSelection() {
            isSelecting = false;
            sector.style.display = 'none';
            startTimeLabel.style.display = 'none';
            endTimeLabel.style.display = 'none';
            mouseTimeLabel.style.display = 'none';
        }

        // 鼠标在圆盘内移动 → 实时显示时间
        pieBase.addEventListener('mousemove', (e) => {
            const currentAngle = getMouseAngle(e);
            showTimeLabel(mouseTimeLabel, currentAngle);

            if (isSelecting) {
                drawSector(startAngle, currentAngle);
                showTimeLabel(endTimeLabel, currentAngle);
            }
        });

        // 鼠标移出圆盘 → 隐藏时间数字
        pieBase.addEventListener('mouseleave', () => {
            mouseTimeLabel.style.display = 'none';
        });

        // 点击选择时间
        pieBase.addEventListener('click', (e) => {
            e.stopPropagation();
            if (!isSelecting) {
                startAngle = getMouseAngle(e);
                isSelecting = true;
                sector.style.display = 'block';
                showTimeLabel(startTimeLabel, startAngle);
                drawSector(startAngle, startAngle);
            } else {
                isSelecting = false;
                endAngle = getMouseAngle(e); // 保存选中的结束角度
                drawSector(startAngle, endAngle);
                showTimeLabel(endTimeLabel, endAngle);
                showTimeText(startAngle, endAngle);
                showForm();
            }
        });

        // 仅 ESC 取消
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') cancelSelection();
        });

        // 绘制扇形
        function drawSector(start, end) {
            let angleDiff = end - start;
            if (angleDiff < 0) angleDiff += 360;
            let clipPath = `polygon(50% 50%, ${getPointPath(start)}`;
            for (let i = 1; i <= angleDiff / 5; i++) {
                const a = start + i * 5;
                clipPath += `, ${getPointPath(a)}`;
            }
            clipPath += `, ${getPointPath(end)})`;
            sector.style.clipPath = clipPath;
        }

        function getPointPath(angle) {
            const rad = angle * Math.PI / 180;
            const x = 50 + 50 * Math.sin(rad);
            const y = 50 - 50 * Math.cos(rad);
            return `${x}% ${y}%`;
        }

        function angleToTime(angle) {
            const totalMinutes = Math.round(angle / 15 * 30);
            const hours = Math.floor(totalMinutes / 60);
            const minutes = totalMinutes % 60;
            if (hours === 0) return minutes === 0 ? '12点' : '12点30分';
            return minutes === 0 ? `${hours}点` : `${hours}点30分`;
        }

        function showTimeText(start, end) {
            timeTitle.textContent = `${angleToTime(start)} - ${angleToTime(end)}`;
            timeTitle.style.display = 'block';
        }

        function showForm() {
            taskSelect.style.display = 'block';
            deliveryInput.style.display = 'none';
            confirmBtn.style.display = 'block';
            taskSelect.value = '';
        }

        taskSelect.addEventListener('change', () => {
            deliveryInput.style.display = taskSelect.value === 'boss' ? 'block' : 'none';
        });

        // 确认保存 —— 修复所有可视化问题
        confirmBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (!taskSelect.value) return alert('请选择任务');
            
            // 1. 每次自动分配不同颜色
            const color = colors[savedSectors.length % colors.length];
            const start = startAngle;
            const end = endAngle; // 使用准确选中的角度

            // 创建永久扇形，颜色一致
            const newSector = document.createElement('div');
            newSector.className = 'pie-sector';
            newSector.style.background = color;
            newSector.style.display = 'block';
            pieBase.appendChild(newSector);
            drawSector(start, end);
            newSector.style.clipPath = sector.style.clipPath;

            // 任务文本
            let taskText = {
                boss: '投boss直聘',
                eat: '吃饭',
                excrete: '排泄'
            }[taskSelect.value];

            if (taskSelect.value === 'boss') {
                taskText += ` ${deliveryInput.value || 0} 家`;
            }

            // 计算位置：事项完全放在圆盘外侧，不重合
            const midAngle = (start + end) / 2;
            const rad = (midAngle - 90) * Math.PI / 180;
            
            // 箭头长度加长，确保事项在圆盘外
            const arrowLength = 120;
            const textDistance = 180;

            const arrowX = radius + radius * Math.cos(rad);
            const arrowY = radius + radius * Math.sin(rad);
            const textX = radius + textDistance * Math.cos(rad);
            const textY = radius + textDistance * Math.sin(rad);

            // 箭头（与扇形同色）
            const arrow = document.createElement('div');
            arrow.className = 'event-arrow';
            arrow.style.left = `${arrowX}px`;
            arrow.style.top = `${arrowY}px`;
            arrow.style.width = `${arrowLength}px`;
            arrow.style.transform = `rotate(${midAngle}deg)`;
            arrow.style.background = color;
            clockContainer.appendChild(arrow);

            // 事项标签（与扇形同色，在圆盘外侧）
            const event = document.createElement('div');
            event.className = 'event-item';
            event.textContent = taskText;
            event.style.left = `${textX}px`;
            event.style.top = `${textY}px`;
            event.style.background = color;
            event.style.color = '#fff';
            clockContainer.appendChild(event);

            savedSectors.push({ start, end, color, task: taskText });

            // 重置界面
            sector.style.display = 'none';
            startTimeLabel.style.display = 'none';
            endTimeLabel.style.display = 'none';
            timeTitle.style.display = 'none';
            taskSelect.style.display = 'none';
            deliveryInput.style.display = 'none';
            confirmBtn.style.display = 'none';
        });
    </script>
</body>
</html>
